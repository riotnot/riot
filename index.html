<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Chat Room</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --mine: #38bdf8;
      --other: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: min(960px, 100%);
      height: min(92vh, 860px);
      background: rgba(17,24,39,.96);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .topbar {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(148,163,184,.15);
    }
    .topbar h1 { margin: 0; font-size: 1.25rem; }
    .topbar p { margin: 6px 0 0; color: var(--muted); font-size: .95rem; }
    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .settings input {
      width: 100%;
      border: 1px solid rgba(148,163,184,.18);
      background: #0b1220;
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      outline: none;
    }
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: var(--mine);
      color: #00111a;
      border-bottom-right-radius: 4px;
    }
    .msg.other {
      align-self: flex-start;
      background: var(--other);
      border-bottom-left-radius: 4px;
    }
    .meta {
      display: block;
      margin-top: 6px;
      font-size: .75rem;
      opacity: .75;
    }
    .composer {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid rgba(148,163,184,.15);
      background: rgba(15,23,42,.72);
    }
    .composer input {
      flex: 1;
      border: 1px solid rgba(148,163,184,.18);
      background: #0b1220;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 14px;
      outline: none;
      font-size: 1rem;
    }
    .composer button {
      border: none;
      padding: 0 18px;
      border-radius: 14px;
      background: var(--accent);
      color: #00111a;
      font-weight: 700;
      cursor: pointer;
    }
    .composer button:hover { filter: brightness(1.05); }
    .hint { color: var(--muted); font-size: .85rem; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Multiplayer Chat Room</h1>
      <p>Works on GitHub Pages with Firebase Realtime Database.</p>

      <div class="settings">
        <input id="nameInput" placeholder="Your name" />
        <input id="roomInput" placeholder="Room name" value="main" />
      </div>
      <div class="hint">Open this page in two tabs or send the GitHub Pages link to someone else.</div>
    </div>

    <div id="messages" class="messages"></div>

    <form id="chatForm" class="composer">
      <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const nameInput = document.getElementById("nameInput");
    const roomInput = document.getElementById("roomInput");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const messages = document.getElementById("messages");

    nameInput.value = localStorage.getItem("chat_name") || "Guest";
    nameInput.addEventListener("input", () => localStorage.setItem("chat_name", nameInput.value || "Guest"));

    let roomRef = null;
    let currentRoom = "";

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[m]));
    }

    function renderMessage(data) {
      const div = document.createElement("div");
      div.className = "msg " + (data.name === nameInput.value ? "mine" : "other");
      div.innerHTML = `
        <strong>${escapeHtml(data.name || "Guest")}:</strong> ${escapeHtml(data.text || "")}
        <span class="meta">${new Date(data.time || Date.now()).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function connectRoom(roomName) {
      const room = (roomName || "main").trim().toLowerCase();
      if (!room) return;

      currentRoom = room;
      messages.innerHTML = "";
      if (roomRef) roomRef.off();

      roomRef = db.ref("rooms/" + room + "/messages");

      roomRef.on("child_added", (snap) => {
        renderMessage(snap.val());
      });
    }

    roomInput.addEventListener("change", () => connectRoom(roomInput.value));

    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text || !roomRef) return;

      const msg = {
        name: (nameInput.value || "Guest").trim(),
        text,
        time: Date.now()
      };

      roomRef.push(msg);
      messageInput.value = "";
    });

    connectRoom(roomInput.value);
  </script>
</body>
</html>
