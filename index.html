<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Chat</title>
<style>
  :root{
    --bg: #060814;
    --panel: rgba(12, 16, 30, 0.78);
    --panel-2: rgba(255,255,255,0.05);
    --line: rgba(255,255,255,0.10);
    --text: rgba(255,255,255,0.90);
    --muted: rgba(255,255,255,0.48);
    --accent: #7c8cff;
    --accent-2: #4be3c6;
    --danger: #ff6b6b;
    --shadow: 0 22px 60px rgba(0,0,0,0.45);
    --radius: 22px;
  }

  * { box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(124,140,255,0.18), transparent 32%),
      radial-gradient(circle at bottom right, rgba(75,227,198,0.12), transparent 30%),
      linear-gradient(180deg, #070915 0%, #04050b 100%);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .app {
    height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .shell {
    width: min(1100px, 100%);
    height: min(820px, 100%);
    display: grid;
    grid-template-columns: 320px 1fr;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }

  .sidebar {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), transparent 30%),
      rgba(255,255,255,0.03);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 18px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-badge {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #9a6bff);
    box-shadow: 0 10px 24px rgba(124,140,255,0.35);
  }

  .brand h1 {
    font-size: 1.05rem;
    margin: 0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand p {
    margin: 4px 0 0;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
    padding: 16px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff5d5d;
    box-shadow: 0 0 0 4px rgba(255,93,93,0.10);
  }
  .dot.online {
    background: #4dff88;
    box-shadow: 0 0 0 4px rgba(77,255,136,0.10);
  }

  .label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }

  input, button, textarea {
    font: inherit;
  }

  .field {
    width: 100%;
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.22);
    color: var(--text);
    border-radius: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s ease, transform .1s ease, background .15s ease;
  }

  .field:focus {
    border-color: rgba(124,140,255,0.8);
    background: rgba(255,255,255,0.06);
  }

  .btn {
    width: 100%;
    border: 0;
    border-radius: 14px;
    padding: 12px 14px;
    background: linear-gradient(135deg, var(--accent), #9a6bff);
    color: white;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 16px 30px rgba(124,140,255,0.28);
    transition: transform .12s ease, filter .15s ease;
  }

  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
  }

  .main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-width: 0;
  }

  .topbar {
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .title-wrap h2 {
    margin: 0;
    font-size: 1.15rem;
    letter-spacing: 0.04em;
  }

  .title-wrap span {
    color: var(--muted);
    font-size: 0.82rem;
  }

  .room-pill {
    border: 1px solid rgba(75,227,198,0.22);
    background: rgba(75,227,198,0.08);
    color: #8af3e0;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .messages {
    padding: 18px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: min(720px, 92%);
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    animation: pop .18s ease-out;
  }

  .message.me {
    align-self: flex-end;
    border-color: rgba(124,140,255,0.35);
    background: linear-gradient(180deg, rgba(124,140,255,0.16), rgba(255,255,255,0.04));
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 0.76rem;
    color: var(--muted);
  }

  .sender {
    font-weight: 700;
    color: var(--text);
  }

  .time {
    opacity: .75;
  }

  .bubble {
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .composer {
    padding: 18px;
    border-top: 1px solid var(--line);
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.03));
  }

  .compose-grid {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 10px;
  }

  .footer-note {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.76rem;
    letter-spacing: 0.04em;
  }

  .system {
    align-self: center;
    color: rgba(255,255,255,0.36);
    font-style: italic;
    font-size: 0.84rem;
    border: 1px dashed rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.03);
  }

  @keyframes pop {
    from { opacity: 0; transform: translateY(6px) scale(0.99); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 900px) {
    .shell {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .sidebar {
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }
    .compose-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>
          <h1>Nova Chat</h1>
          <p>Realtime room</p>
        </div>
      </div>

      <div class="card">
        <div class="status-row">
          <div id="dot" class="dot"></div>
          <div id="statusText">offline</div>
        </div>
      </div>

      <div class="card">
        <div class="label">Your name</div>
        <input id="nameInput" class="field" maxlength="20" placeholder="Enter your name" />
      </div>

      <div class="card">
        <div class="label">Room</div>
        <div class="room-pill">general-chat</div>
      </div>

      <div class="card">
        <div class="label">Tips</div>
        <div class="chip-row">
          <div class="chip">Enter to send</div>
          <div class="chip">Shift+Enter for new line</div>
          <div class="chip">Auto-scroll on new messages</div>
        </div>
      </div>

      <button id="joinBtn" class="btn">Join Chat</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-wrap">
          <h2>Live Conversation</h2>
          <span id="subText">Waiting to connect</span>
        </div>
        <div class="room-pill" id="onlineCount">0 online</div>
      </header>

      <section id="messages" class="messages">
        <div class="message system">Join the room to start chatting.</div>
      </section>

      <footer class="composer">
        <div class="compose-grid">
          <input id="msgInput" class="field" placeholder="Write a message..." disabled />
          <button id="sendBtn" class="btn" disabled>Send</button>
        </div>
        <div class="footer-note">Clean, minimal, and designed for real-time messaging.</div>
      </footer>
    </main>
  </div>
</div>

<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
<script>
const CHANNEL_ID = 'yiS12sB9DxAb9iIu';
const ROOM_NAME = 'general-chat';

const statusText = document.getElementById('statusText');
const subText = document.getElementById('subText');
const onlineCount = document.getElementById('onlineCount');
const dot = document.getElementById('dot');

const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const messagesEl = document.getElementById('messages');

let drone = null;
let room = null;
let joined = false;
let me = {
  id: sessionStorage.getItem('nova_chat_id') || ('u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36)),
  name: localStorage.getItem('nova_chat_name') || ''
};
sessionStorage.setItem('nova_chat_id', me.id);
nameInput.value = me.name;

const peers = new Map();

function saveName(n) {
  localStorage.setItem('nova_chat_name', n);
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function timeLabel() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function setOnline(online) {
  dot.classList.toggle('online', online);
  statusText.textContent = online ? 'online' : 'offline';
}

function updateCounts() {
  const count = joined ? Math.max(1, peers.size + 1) : peers.size;
  onlineCount.textContent = `${count} online`;
  subText.textContent = joined ? 'Connected and ready' : 'Waiting to connect';
}

function appendMessage({ name, text, color, self = false, system = false }) {
  const div = document.createElement('div');
  div.className = 'message' + (self ? ' me' : '') + (system ? ' system' : '');

  if (system) {
    div.textContent = text;
  } else {
    div.innerHTML = `
      <div class="meta">
        <span class="sender" style="color:${color || '#fff'}">${esc(name)}</span>
        <span class="time">${timeLabel()}</span>
      </div>
      <div class="bubble">${esc(text)}</div>
    `;
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function connect() {
  drone = new Scaledrone(CHANNEL_ID);

  drone.on('open', err => {
    if (err) {
      console.error(err);
      setOnline(false);
      subText.textContent = 'Connection error';
      return;
    }

    setOnline(true);
    subText.textContent = 'Connected';

    room = drone.subscribe(ROOM_NAME);

    room.on('open', err2 => {
      if (err2) {
        console.error(err2);
        setOnline(false);
        subText.textContent = 'Room error';
        return;
      }
      joined = true;
      msgInput.disabled = false;
      sendBtn.disabled = false;
      joinBtn.textContent = 'Joined';
      joinBtn.disabled = true;
      appendMessage({ system: true, text: 'You joined the chat.' });
      publishPresence();
      updateCounts();
    });

    room.on('members', members => {
      peers.clear();
      for (const member of members) {
        if (member.id !== me.id) peers.set(member.id, member);
      }
      updateCounts();
    });

    room.on('member_join', member => {
      if (member.id !== me.id) {
        peers.set(member.id, member);
        updateCounts();
        appendMessage({ system: true, text: 'Someone joined the room.' });
      }
    });

    room.on('member_leave', member => {
      if (member.id !== me.id) {
        peers.delete(member.id);
        updateCounts();
        appendMessage({ system: true, text: 'Someone left the room.' });
      }
    });

    room.on('message', message => {
      const data = message.data || {};
      if (!data || data.type !== 'chat') return;
      if (data.id === me.id) return;
      appendMessage({
        name: data.name || 'Anonymous',
        text: data.text || '',
        color: data.color || '#7c8cff'
      });
    });
  });

  drone.on('close', () => {
    setOnline(false);
    subText.textContent = 'Disconnected';
  });

  drone.on('error', err => {
    console.error(err);
    setOnline(false);
    subText.textContent = 'Connection error';
  });

  setInterval(() => {
    if (joined) publishPresence();
  }, 3000);
}

function publishPresence() {
  if (!drone || !joined) return;
  drone.publish({
    room: ROOM_NAME,
    message: {
      type: 'presence',
      id: me.id,
      name: me.name || 'Anonymous'
    }
  });
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !joined) return;

  const name = me.name || nameInput.value.trim() || 'Anonymous';
  me.name = name;
  saveName(name);

  appendMessage({
    name,
    text,
    color: '#7c8cff',
    self: true
  });

  drone.publish({
    room: ROOM_NAME,
    message: {
      type: 'chat',
      id: me.id,
      name,
      text,
      color: '#7c8cff'
    }
  });

  msgInput.value = '';
  msgInput.focus();
}

joinBtn.addEventListener('click', () => {
  const name = nameInput.value.trim() || 'Anonymous';
  me.name = name;
  saveName(name);
  if (!drone) connect();
  publishPresence();
});

sendBtn.addEventListener('click', sendMessage);

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!drone) connect();
    else publishPresence();
  }
});

updateCounts();
connect();
</script>
</body>
</html>
