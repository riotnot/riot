<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5 Circles Tabs</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #0b0d14;
    font-family: system-ui, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #info {
    position: fixed;
    top: 12px;
    left: 12px;
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    background: rgba(0,0,0,0.35);
    padding: 8px 10px;
    border-radius: 8px;
    backdrop-filter: blur(6px);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Open this page in up to 5 tabs. Each tab becomes a circle.</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

const MAX_CIRCLES = 5;
const CHANNEL_NAME = 'five-circles-tabs-v1';
const TAB_TTL = 1500;

let W = 0, H = 0;
let myId = sessionStorage.getItem('tab_id');
if (!myId) {
  myId = 'tab_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
  sessionStorage.setItem('tab_id', myId);
}

const bc = new BroadcastChannel(CHANNEL_NAME);
const tabs = new Map();

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = Math.floor(window.innerWidth);
  H = Math.floor(window.innerHeight);
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function now() {
  return Date.now();
}

function makeColor(i) {
  const colors = ['#7090ff', '#ff6644', '#44ffcc', '#ff44aa', '#ffcc44'];
  return colors[i % colors.length];
}

function heartbeat() {
  bc.postMessage({
    type: 'hello',
    id: myId,
    ts: now()
  });
}

bc.onmessage = (event) => {
  const msg = event.data;
  if (!msg || !msg.type) return;

  if (msg.id === myId) return;

  if (msg.type === 'hello') {
    tabs.set(msg.id, { id: msg.id, lastSeen: now() });
  }
};

function cleanupTabs() {
  const t = now();
  for (const [id, tab] of tabs.entries()) {
    if (t - tab.lastSeen > TAB_TTL) tabs.delete(id);
  }
}

function drawCircle(x, y, r, color, label, active) {
  ctx.save();
  ctx.shadowBlur = active ? 24 : 12;
  ctx.shadowColor = color;

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color + '22';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = color;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '600 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(label, x, y + r + 10);
  ctx.restore();
}

function render() {
  cleanupTabs();

  const visibleTabs = [
    { id: myId, lastSeen: now(), self: true },
    ...Array.from(tabs.values()).map(t => ({ ...t, self: false }))
  ].slice(0, MAX_CIRCLES);

  ctx.clearRect(0, 0, W, H);

  const gap = W / (MAX_CIRCLES + 1);
  const y = H / 2;
  const r = Math.min(48, Math.max(26, Math.min(W, H) * 0.06));

  for (let i = 0; i < MAX_CIRCLES; i++) {
    const x = gap * (i + 1);

    const entry = visibleTabs[i];
    const occupied = !!entry;

    if (occupied) {
      const color = entry.self ? '#44ff88' : makeColor(i);
      const label = entry.self ? 'You' : 'Tab';
      drawCircle(x, y, r, color, label, true);
    } else {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.font = '600 14px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('Empty', x, y + r + 10);
      ctx.restore();
    }
  }

  info.textContent = `Open tabs detected: ${Math.min(1 + tabs.size, 5)} / 5`;
}

setInterval(() => {
  heartbeat();
}, 500);

setInterval(() => {
  heartbeat();
  render();
}, 60);

window.addEventListener('beforeunload', () => {
  bc.close();
});

heartbeat();
render();
</script>
</body>
</html>
