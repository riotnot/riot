<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIOT | PUBLIC WORLD</title>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080808; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        
        #game-canvas { position: absolute; width: 100vw; height: 100vh; background: #111; }

        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transition: all 0.1s linear;
            display: flex;
            justify-content: center;
        }

        .name-tag {
            position: absolute;
            top: -20px;
            font-size: 10px;
            white-space: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
        }

        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 10px;
            display: none;
        }

        .m-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; }
        
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <div class="ui">WASD TO MOVE | M FOR MINIMAP</div>
    <div id="game-canvas"></div>
    <div id="minimap"></div>

    <script>
        // Public Scaling Drone ID (No setup required for you)
        const drone = new Scaledrone('yiS12sB9DxAb9iIu'); 
        const roomName = 'observable-public-riot-world';
        let room;

        const canvas = document.getElementById('game-canvas');
        const minimap = document.getElementById('minimap');

        // Local Storage for consistent Identity
        if (!localStorage.getItem('riot_user_id')) {
            localStorage.setItem('riot_user_id', Math.random().toString(36).substr(2, 5));
        }
        
        const myId = localStorage.getItem('riot_user_id');
        const myColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
        let myPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        
        let players = {};
        let keys = {};
        let mVisible = false;

        drone.on('open', error => {
            if (error) return console.error(error);
            room = drone.subscribe(roomName);
            
            room.on('data', (data) => {
                if (data.id === myId) return;
                updatePlayer(data);
            });
        });

        function updatePlayer(data) {
            if (!players[data.id]) {
                const div = document.createElement('div');
                div.id = 'p-' + data.id;
                div.className = 'player';
                div.innerHTML = `<span class="name-tag">${data.id === myId ? 'YOU' : 'PLAYER'}</span>`;
                div.style.backgroundColor = data.color;
                canvas.appendChild(div);
            }
            const el = document.getElementById('p-' + data.id);
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            players[data.id] = data;
        }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'm') {
                mVisible = !mVisible;
                minimap.style.display = mVisible ? 'block' : 'none';
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function gameLoop() {
            let moved = false;
            if (keys['w'] && myPos.y > 0) { myPos.y -= 6; moved = true; }
            if (keys['s'] && myPos.y < window.innerHeight - 30) { myPos.y += 6; moved = true; }
            if (keys['a'] && myPos.x > 0) { myPos.x -= 6; moved = true; }
            if (keys['d'] && myPos.x < window.innerWidth - 30) { myPos.x += 6; moved = true; }

            if (moved) {
                // Update me locally
                updatePlayer({ id: myId, x: myPos.x, y: myPos.y, color: '#fff' });
                // Send to the public
                if (room) {
                    drone.publish({
                        room: roomName,
                        message: { id: myId, x: myPos.x, y: myPos.y, color: myColor }
                    });
                }
            }

            if (mVisible) {
                minimap.innerHTML = '';
                Object.values(players).forEach(p => {
                    const dot = document.createElement('div');
                    dot.className = 'm-dot';
                    dot.style.left = (p.x / window.innerWidth * 160) + 'px';
                    dot.style.top = (p.y / window.innerHeight * 120) + 'px';
                    dot.style.backgroundColor = p.color;
                    minimap.appendChild(dot);
                });
            }
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
