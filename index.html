<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIOT | MULTIPLAYER LIVE</title>
    <script src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #game-world { position: relative; width: 100vw; height: 100vh; background: #111; }

        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transition: all 0.1s linear;
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* Mini-Map */
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            border-radius: 10px;
            display: none;
            overflow: hidden;
        }

        .m-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; }
        .controls { position: absolute; top: 10px; left: 10px; color: #444; font-size: 10px; letter-spacing: 1px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-world">
        <div class="controls">WASD: MOVE | M: MINIMAP</div>
        <div id="minimap"></div>
    </div>

    <script>
        // Public Channel ID for testing
        const drone = new Scaledrone('yiS12sB9DxAb9iIu'); 
        const roomName = 'observable-riot-room';
        let room;

        const world = document.getElementById('game-world');
        const minimap = document.getElementById('minimap');

        const myId = Math.random().toString(36).substr(2, 9);
        const myColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
        let myPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        
        let players = {};
        let keys = {};
        let mVisible = false;

        drone.on('open', error => {
            if (error) return console.error(error);
            room = drone.subscribe(roomName);
            
            room.on('data', (data) => {
                if (data.id === myId) return;
                updateRemotePlayer(data);
            });
        });

        function updateRemotePlayer(data) {
            if (!players[data.id]) {
                const el = document.createElement('div');
                el.id = 'player-' + data.id;
                el.className = 'player';
                el.style.backgroundColor = data.color;
                world.appendChild(el);
                players[data.id] = data;
            }
            const pEl = document.getElementById('player-' + data.id);
            pEl.style.left = data.x + 'px';
            pEl.style.top = data.y + 'px';
            players[data.id] = data;
        }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'm') {
                mVisible = !mVisible;
                minimap.style.display = mVisible ? 'block' : 'none';
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function loop() {
            let moved = false;
            if (keys['w'] && myPos.y > 0) { myPos.y -= 8; moved = true; }
            if (keys['s'] && myPos.y < window.innerHeight - 30) { myPos.y += 8; moved = true; }
            if (keys['a'] && myPos.x > 0) { myPos.x -= 8; moved = true; }
            if (keys['d'] && myPos.x < window.innerWidth - 30) { myPos.x += 8; moved = true; }

            if (moved) {
                // Draw self
                updateRemotePlayer({ id: myId, x: myPos.x, y: myPos.y, color: '#fff' });
                // Send to others
                if (room) {
                    drone.publish({
                        room: roomName,
                        message: { id: myId, x: myPos.x, y: myPos.y, color: myColor }
                    });
                }
            }

            if (mVisible) {
                minimap.innerHTML = '';
                Object.values(players).forEach(p => {
                    const dot = document.createElement('div');
                    dot.className = 'm-dot';
                    dot.style.left = (p.x / window.innerWidth * 160) + 'px';
                    dot.style.top = (p.y / window.innerHeight * 120) + 'px';
                    dot.style.backgroundColor = p.color;
                    minimap.appendChild(dot);
                });
            }
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
