<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@riotnot | Bio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #bb9af7;
            margin-bottom: 15px;
            transition: transform 0.3s;
        }

        .profile-pic:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 5px; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }

        /* Buttons */
        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-item {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(187, 154, 247, 0.2);
            border: 1px solid #bb9af7;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(187, 154, 247, 0.4);
        }

        /* Music Bar effect */
        .music-player {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bar { width: 3px; height: 12px; background: #bb9af7; animation: bounce 1s infinite; }
        @keyframes bounce { 
            0%, 100% { height: 5px; } 
            50% { height: 15px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/riotnot.png" alt="pfp" class="profile-pic">
        
        <h1>riotnot</h1>
        <p>Developer & Creator</p>

        <div class="links">
            <a href="https://www.roblox.com" target="_blank" class="link-item">Roblox Studio Projects</a>
            <a href="https://github.com/riotnot" target="_blank" class="link-item">GitHub Projects</a>
            <a href="#" class="link-item">Discord Server</a>
        </div>

        <div class="music-player">
            <div class="bar"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <span>Now Playing: Phonk Mix 2026</span>
        </div>
    </div>

</body>
</html>
