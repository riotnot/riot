<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Circles</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #111827 0%, #05070d 100%);
    font-family: system-ui, sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #status {
    position: fixed;
    top: 12px;
    left: 12px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.35);
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    backdrop-filter: blur(8px);
    z-index: 5;
  }

  #hint {
    position: fixed;
    bottom: 12px;
    left: 12px;
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 5;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">Connecting...</div>
<div id="hint">Open up to 5 tabs or browsers. Each live client becomes one circle.</div>

<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
<script>
const CHANNEL_ID = 'yiS12sB9DxAb9iIu';
const ROOM_NAME = 'observable-live-circles-v2';
const MAX_CIRCLES = 5;
const HEARTBEAT_MS = 1000;
const TIMEOUT_MS = 4000;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let W = 0, H = 0;
let drone = null;
let room = null;
let connected = false;

const me = {
  id: sessionStorage.getItem('live_circle_id') || ('c_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36))
};
sessionStorage.setItem('live_circle_id', me.id);

const peers = new Map();

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function now() {
  return Date.now();
}

function makeColor(i) {
  const colors = ['#7090ff', '#ff6644', '#44ffcc', '#ff44aa', '#ffcc44'];
  return colors[i % colors.length];
}

function drawCircle(x, y, r, color, label, glow) {
  ctx.save();
  ctx.shadowBlur = glow ? 24 : 10;
  ctx.shadowColor = color;

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color + '22';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = color;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.font = '600 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(label, x, y + r + 10);
  ctx.restore();
}

function prunePeers() {
  const t = now();
  for (const [id, peer] of peers.entries()) {
    if (t - peer.lastSeen > TIMEOUT_MS) peers.delete(id);
  }
}

function updateStatus() {
  statusEl.textContent = connected
    ? `Connected • live ${Math.min(1 + peers.size, MAX_CIRCLES)} / ${MAX_CIRCLES}`
    : 'Offline';
}

function publishPresence() {
  if (!connected || !room) return;
  drone.publish({
    room: ROOM_NAME,
    message: {
      type: 'presence',
      id: me.id,
      ts: now()
    }
  });
}

function handleMessage(message) {
  if (!message || !message.data) return;
  const data = message.data;
  if (!data || data.type !== 'presence') return;
  if (data.id === me.id) return;

  peers.set(data.id, {
    id: data.id,
    lastSeen: now()
  });
}

function render() {
  prunePeers();

  const live = [
    { id: me.id, self: true, lastSeen: now() },
    ...Array.from(peers.values())
  ].slice(0, MAX_CIRCLES);

  ctx.clearRect(0, 0, W, H);

  const gap = W / (MAX_CIRCLES + 1);
  const y = H / 2;
  const r = Math.min(52, Math.max(28, Math.min(W, H) * 0.07));

  for (let i = 0; i < MAX_CIRCLES; i++) {
    const x = gap * (i + 1);
    const entry = live[i];

    if (entry) {
      const color = entry.self ? '#44ff88' : makeColor(i);
      const label = entry.self ? 'You' : 'Live';
      drawCircle(x, y, r, color, label, true);
    } else {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.font = '600 14px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('Empty', x, y + r + 10);
      ctx.restore();
    }
  }

  updateStatus();
}

function connect() {
  drone = new Scaledrone(CHANNEL_ID);

  drone.on('open', err => {
    if (err) {
      console.error(err);
      statusEl.textContent = 'Connection error';
      connected = false;
      return;
    }

    connected = true;
    updateStatus();

    room = drone.subscribe(ROOM_NAME);

    room.on('open', err2 => {
      if (err2) {
        console.error(err2);
        statusEl.textContent = 'Room error';
        connected = false;
        return;
      }
      publishPresence();
    });

    room.on('message', handleMessage);

    room.on('members', () => {
      publishPresence();
    });

    room.on('member_join', () => {
      publishPresence();
    });

    room.on('member_leave', member => {
      if (member && peers.has(member.id)) {
        peers.delete(member.id);
      }
    });
  });

  drone.on('close', () => {
    connected = false;
    updateStatus();
  });

  drone.on('error', err => {
    console.error(err);
    connected = false;
    updateStatus();
  });

  setInterval(() => {
    publishPresence();
  }, HEARTBEAT_MS);

  setInterval(() => {
    render();
  }, 1000 / 30);
}

connect();
render();
</script>
</body>
</html>
