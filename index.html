<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Circles</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b0d14;
    font-family: system-ui, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #info {
    position: fixed;
    top: 12px;
    left: 12px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    background: rgba(0,0,0,0.35);
    padding: 8px 10px;
    border-radius: 8px;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Connecting...</div>

<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
<script>
const CHANNEL_ID = 'yiS12sB9DxAb9iIu';
const ROOM_NAME = 'live-circles-room-v1';
const MAX_CIRCLES = 5;
const HEARTBEAT_MS = 1000;
const TIMEOUT_MS = 4000;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let W = 0, H = 0;
let me = null;
let drone = null;
let room = null;
let connected = false;

const clients = new Map();

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function makeId() {
  return 'c_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
}

function makeColor(i) {
  const colors = ['#7090ff', '#ff6644', '#44ffcc', '#ff44aa', '#ffcc44'];
  return colors[i % colors.length];
}

function now() {
  return Date.now();
}

function drawCircle(x, y, r, color, label, active) {
  ctx.save();
  ctx.shadowBlur = active ? 24 : 12;
  ctx.shadowColor = color;

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color + '22';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = color;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.font = '600 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(label, x, y + r + 10);
  ctx.restore();
}

function pruneClients() {
  const t = now();
  for (const [id, c] of clients.entries()) {
    if (t - c.lastSeen > TIMEOUT_MS) clients.delete(id);
  }
}

function publishState() {
  if (!connected || !room || !me) return;
  drone.publish({
    room: ROOM_NAME,
    message: {
      type: 'presence',
      id: me.id,
      ts: now()
    }
  });
}

function render() {
  pruneClients();

  const list = [
    { id: me.id, self: true, lastSeen: now() },
    ...Array.from(clients.values()).filter(c => c.id !== me.id).sort((a, b) => a.id.localeCompare(b.id))
  ].slice(0, MAX_CIRCLES);

  ctx.clearRect(0, 0, W, H);

  const gap = W / (MAX_CIRCLES + 1);
  const y = H / 2;
  const r = Math.min(50, Math.max(28, Math.min(W, H) * 0.06));

  for (let i = 0; i < MAX_CIRCLES; i++) {
    const x = gap * (i + 1);
    const entry = list[i];

    if (entry) {
      const color = entry.self ? '#44ff88' : makeColor(i);
      const label = entry.self ? 'You' : 'Live';
      drawCircle(x, y, r, color, label, true);
    } else {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.font = '600 14px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('Empty', x, y + r + 10);
      ctx.restore();
    }
  }

  info.textContent = `Live clients: ${Math.min(list.length, MAX_CIRCLES)} / ${MAX_CIRCLES}` + (connected ? '' : ' • offline');
}

function handleMessage(message) {
  const data = message.data || message;
  if (!data || data.type !== 'presence') return;
  if (data.id === me.id) return;
  clients.set(data.id, { id: data.id, lastSeen: now() });
}

function start() {
  me = {
    id: sessionStorage.getItem('live_circle_id') || makeId()
  };
  sessionStorage.setItem('live_circle_id', me.id);

  drone = new Scaledrone(CHANNEL_ID);

  drone.on('open', err => {
    if (err) {
      console.error(err);
      info.textContent = 'Connection error';
      return;
    }

    connected = true;
    info.textContent = 'Connected';

    room = drone.subscribe(ROOM_NAME);

    room.on('open', err2 => {
      if (err2) {
        console.error(err2);
        return;
      }
      publishState();
    });

    room.on('message', handleMessage);
    room.on('member_join', () => publishState());
    room.on('members', () => publishState());
  });

  drone.on('close', () => {
    connected = false;
    info.textContent = 'Disconnected';
  });

  drone.on('error', () => {
    connected = false;
    info.textContent = 'Error';
  });

  setInterval(publishState, HEARTBEAT_MS);
  setInterval(render, 60);
}

start();
render();
</script>
</body>
</html>
