<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden;
      font-family: Inter, Arial, sans-serif; color: var(--text);
    }
    body {
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 24%),
        radial-gradient(circle at 50% 60%, rgba(255,255,255,.03), transparent 35%),
        linear-gradient(180deg, #070707 0%, #000 55%);
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; opacity: .08; z-index: 1;
      background-image: radial-gradient(rgba(255,255,255,.8) 0.6px, transparent 0.6px);
      background-size: 4px 4px; mix-blend-mode: screen;
    }
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.7) 100%);
    }
    .scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; z-index: 3; }
    .center, .mid, .links {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px; text-align: center;
    }
    .center { z-index: 6; transition: opacity .35s ease, transform .35s ease; }
    .enter {
      background: transparent; border: none; outline: none; color: rgba(255,255,255,.92);
      padding: 14px 22px; font-size: clamp(1rem, 2vw, 1.25rem); letter-spacing: .10em; text-transform: uppercase;
      cursor: pointer; transition: opacity .35s ease, letter-spacing .35s ease, text-shadow .35s ease, transform .35s ease;
      opacity: .9;
    }
    .enter:hover {
      opacity: 1;
      letter-spacing: .12em;
      text-shadow: 0 0 8px rgba(255,255,255,.12);
      transform: scale(1.01);
    }
    .enter:active { transform: scale(.99); }
    .mid { z-index: 5; opacity: 0; pointer-events: none; }
    .midText {
      font-size: clamp(4rem, 18vw, 12rem); font-weight: 900; letter-spacing: .01em; line-height: .62; text-transform: uppercase; display: inline-block; transform-origin: center;
      color: #000; -webkit-text-stroke: 5px #fff; text-stroke: 5px #fff; transform: scaleX(.82) scaleY(6.0); filter: drop-shadow(0 0 12px rgba(255,255,255,.08));
    }
    .links { z-index: 7; opacity: 0; pointer-events: none; transition: opacity .65s ease; }
    .links.show { opacity: 1; pointer-events: auto; }
    .link {
      color: #fff; text-decoration: none; font-size: 3.2rem; line-height: 1; display: inline-flex; align-items: center; justify-content: center;
      transition: transform .16s ease, opacity .16s ease, text-shadow .16s ease; opacity: .92; will-change: transform;
    }
    .link:hover { transform: scale(1.14); opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,.3), 0 0 26px rgba(255,255,255,.12); }
    .link:active { transform: scale(1.06); }
    .enter-hide .center { opacity: 0; transform: scale(.98); pointer-events: none; }
    .hidden { display: none; }
    @media (max-width: 600px) {
      .midText { transform: scaleX(.78) scaleY(5.2); }
      .link { font-size: 2.7rem; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="vignette"></div>
  <div class="scene" id="scene">
    <div class="center" id="center">
      <button class="enter" id="enterBtn">click to enter</button>
    </div>
    <div class="mid hidden" id="mid">
      <div class="midText">3sa</div>
    </div>
    <div class="links" id="links">
      <a class="link" href="https://www.instagram.com/riotnot" target="_blank" rel="noopener noreferrer">👀</a>
    </div>
  </div>

  <script>
    const enterBtn = document.getElementById('enterBtn');
    const scene = document.getElementById('scene');
    const mid = document.getElementById('mid');
    const links = document.getElementById('links');

    enterBtn.addEventListener('click', () => {
      scene.classList.add('enter-hide');
      setTimeout(() => {
        mid.classList.remove('hidden');
        mid.style.opacity = '0';
        links.classList.add('show');
      }, 150);
    });
  </script>
</body>
</html>
