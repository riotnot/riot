<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIOT | MAP SYSTEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #121212; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
        }

        #player {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #bb9af7;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(187, 154, 247, 0.5);
        }

        /* Mini Map Styles */
        #minimap {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 150px;
            height: 112px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #bb9af7;
            display: none; /* Hidden by default */
            border-radius: 4px;
        }

        #minimap-player {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
        }

        .controls-hint {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #555;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="controls-hint">WASD TO MOVE | M FOR MINI-MAP</div>
        <div id="player"></div>
        
        <div id="minimap">
            <div id="minimap-player"></div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const minimap = document.getElementById('minimap');
        const mPlayer = document.getElementById('minimap-player');
        const wrapper = document.getElementById('game-wrapper');

        // Game State
        let pos = { x: 390, y: 290 };
        const speed = 5;
        const keys = {};
        let minimapVisible = false;

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            // Toggle Minimap
            if (e.key.toLowerCase() === 'm') {
                minimapVisible = !minimapVisible;
                minimap.style.display = minimapVisible ? 'block' : 'none';
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function update() {
            // Movement Logic
            if (keys['w'] && pos.y > 0) pos.y -= speed;
            if (keys['s'] && pos.y < 580) pos.y += speed;
            if (keys['a'] && pos.x > 0) pos.x -= speed;
            if (keys['d'] && pos.x < 780) pos.x += speed;

            // Update Player Visual
            player.style.left = pos.x + 'px';
            player.style.top = pos.y + 'px';

            // Update Minimap Player Visual
            // Scale is (150/800) for X and (112/600) for Y
            mPlayer.style.left = (pos.x * (150 / 800)) + 'px';
            mPlayer.style.top = (pos.y * (112 / 600)) + 'px';

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
