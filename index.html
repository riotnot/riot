<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }
    body {
      background: #000;
    }
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .center, .links {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }
    .center {
      z-index: 6;
      transition: opacity .35s ease, transform .35s ease;
    }
    .enter {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,.92);
      padding: 14px 22px;
      font-size: clamp(1rem, 2vw, 1.25rem);
      letter-spacing: .10em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .35s ease, letter-spacing .35s ease, text-shadow .35s ease, transform .35s ease;
      opacity: .9;
    }
    .enter:hover {
      opacity: 1;
      letter-spacing: .12em;
      text-shadow: 0 0 8px rgba(255,255,255,.12);
      transform: scale(1.01);
    }
    .enter:active { transform: scale(.99); }
    .links {
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      transition: opacity .65s ease;
    }
    .links.show {
      opacity: 1;
      pointer-events: auto;
    }
    .link {
      color: #fff;
      text-decoration: none;
      font-size: 3.2rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .16s ease, opacity .16s ease, text-shadow .16s ease;
      opacity: .92;
      will-change: transform;
    }
    .link:hover {
      transform: scale(1.14);
      opacity: 1;
      text-shadow: 0 0 10px rgba(255,255,255,.3), 0 0 26px rgba(255,255,255,.12);
    }
    .link:active { transform: scale(1.06); }
    .enter-hide .center {
      opacity: 0;
      transform: scale(.98);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="center" id="center">
      <button class="enter" id="enterBtn">click to enter</button>
    </div>
    <div class="links" id="links">
      <a class="link" href="https://www.instagram.com/riotnot" target="_blank" rel="noopener noreferrer">👀</a>
    </div>
  </div>

  <script>
    const enterBtn = document.getElementById('enterBtn');
    const scene = document.getElementById('scene');
    const links = document.getElementById('links');

    enterBtn.addEventListener('click', () => {
      scene.classList.add('enter-hide');
      setTimeout(() => {
        links.classList.add('show');
      }, 150);
    });
  </script>
</body>
</html>
