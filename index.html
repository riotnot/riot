<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Countdown | Managed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        .timer-display { font-size: 5rem; font-weight: 900; letter-spacing: -2px; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        /* Admin Panel - Hidden by default */
        #admin-panel { 
            display: none; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 30px; 
            border: 1px solid #00ff88;
        }
        
        input, button { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; margin: 5px; cursor: pointer; }
        button:hover { background: #00ff88; color: #000; }
    </style>
</head>
<body>

    <h1 id="header">COUNTDOWN</h1>
    <div class="timer-display" id="timer">00:00:00</div>

    <div id="admin-panel">
        <p style="color: #00ff88; font-size: 0.8rem; margin-bottom: 10px;">ADMIN CONTROLS</p>
        <input type="number" id="minutesInput" placeholder="Minutes">
        <button onclick="adjustTimer('add')">Add Time</button>
        <button onclick="setTimer()">Set Exact</button>
        <button onclick="togglePause()">Pause/Play</button>
    </div>

    <script>
        const BIN_ID = "YOUR_BIN_ID_HERE";
        const API_KEY = "YOUR_API_KEY_HERE";
        
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'riot';

        if (isAdmin) { document.getElementById('admin-panel').style.display = 'block'; }

        async function updateTimer() {
            // In a real app, you'd fetch the JSONbin data here
            // For now, let's look at the local countdown logic
            setInterval(() => {
                const now = new Date().getTime();
                const distance = 1744473600000 - now; // Replace with your end time

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("timer").innerHTML = hours + "h " + minutes + "m " + seconds + "s ";
            }, 1000);
        }

        // Admin Functions
        async function adjustTimer(type) {
            alert("This would send a request to your JSONbin to update the time for EVERYONE.");
            // Logic: Fetch current Bin -> Add Minutes -> PUT back to Bin
        }

        updateTimer();
    </script>
</body>
</html>
